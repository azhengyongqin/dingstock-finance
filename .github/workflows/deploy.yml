name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dingstock-finance-production
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11.7.0'
  APP_DIR: /root/dingstock/dingstock-finance
  FEISHU_BOT_WEBHOOK_URL: ${{ secrets.FEISHU_BOT_WEBHOOK_URL || vars.FEISHU_BOT_WEBHOOK_URL }}

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Lint
        run: pnpm lint:check

      - name: Test
        run: pnpm test --runInBand

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy on Aliyun ECS
    runs-on:
      - self-hosted
      - linux
      - dingstock-finance
    needs: ci
    if: needs.ci.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment files
        env:
          APP_CONFIG_YAML: ${{ secrets.APP_CONFIG_YAML || vars.APP_CONFIG_YAML }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          set -euo pipefail

          mkdir -p "${APP_DIR}" "${APP_DIR}/logs" .deploy

          # APP_CONFIG_YAML 用于生成 ECS 上的 config/app.production.yaml。
          if [ -n "${APP_CONFIG_YAML}" ]; then
            printf '%s\n' "${APP_CONFIG_YAML}" > .deploy/app.production.yaml
          fi

          # PRODUCTION_ENV 用于生成 ECS 上的 .env.production，PM2 启动前会加载。
          if [ -n "${PRODUCTION_ENV}" ]; then
            printf '%s\n' "${PRODUCTION_ENV}" > .deploy/.env.production
          fi

          rsync -a --delete src "${APP_DIR}/"
          rsync -a --delete prisma "${APP_DIR}/"
          rsync -a config "${APP_DIR}/"
          rsync -a .deploy "${APP_DIR}/"
          rsync -a \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            nest-cli.json \
            tsconfig.json \
            tsconfig.build.json \
            prisma.config.ts \
            ecosystem.config.cjs \
            "${APP_DIR}/"

      - name: Install, migrate, build and reload PM2
        run: |
          set -euo pipefail

          cd "${APP_DIR}"

          mkdir -p config logs

          # 如果 GitHub Secret/Variable 提供了生产配置，则覆盖服务器上的生产配置文件。
          if [ -f .deploy/app.production.yaml ]; then
            mv .deploy/app.production.yaml config/app.production.yaml
            chmod 600 config/app.production.yaml
          fi

          # 如果 GitHub Secret 提供了环境变量文件，则让 PM2 启动前加载这些变量。
          if [ -f .deploy/.env.production ]; then
            mv .deploy/.env.production .env.production
            chmod 600 .env.production
          fi
          rm -rf .deploy

          if [ -s "${HOME}/.nvm/nvm.sh" ]; then
            # 兼容使用 nvm 安装 Node.js 的 ECS。
            . "${HOME}/.nvm/nvm.sh"
          fi

          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          # 固定 pnpm store 目录，ECS 后续部署可复用已下载依赖包。
          pnpm config set store-dir "${HOME}/.pnpm-store"

          if ! command -v pm2 >/dev/null 2>&1; then
            npm install -g pm2
          fi

          pnpm install --frozen-lockfile --prefer-offline

          if [ -f .env.production ]; then
            set -a
            . ./.env.production
            set +a
          fi

          pnpm prisma:generate
          pnpm exec prisma migrate deploy
          pnpm build

          pm2 startOrReload ecosystem.config.cjs --env production --update-env
          pm2 save

          # 配置 PM2 开机自启；已配置时重复执行也不会影响当前进程。
          if command -v systemctl >/dev/null 2>&1; then
            pm2 startup systemd -u "$(whoami)" --hp "${HOME}" || true
            systemctl enable "pm2-$(whoami)" || true
          fi

  notify:
    name: Notify Feishu
    runs-on: ubuntu-latest
    needs:
      - ci
      - deploy
    if: always() && env.FEISHU_BOT_WEBHOOK_URL != ''

    steps:
      - name: Send Feishu success message
        if: needs.ci.result == 'success' && needs.deploy.result == 'success'
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ env.FEISHU_BOT_WEBHOOK_URL }}
          msg_type: text
          content: |
            text: |
              Github Action Succeeded:
              repository: ${{ github.repository }}
              committer: ${{ github.actor }}
              event: ${{ github.event_name }}
              ref_name: ${{ github.ref_name }}
              commit_sha: ${{ github.sha }}
              run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
              deploy_path: ${{ env.APP_DIR }}
              ci_status: ${{ needs.ci.result }}
              deploy_status: ${{ needs.deploy.result }}

      - name: Send Feishu failure message
        if: needs.ci.result != 'success' || needs.deploy.result != 'success'
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ env.FEISHU_BOT_WEBHOOK_URL }}
          msg_type: text
          content: |
            text: |
              Github Action Failed:
              repository: ${{ github.repository }}
              committer: ${{ github.actor }}
              event: ${{ github.event_name }}
              ref_name: ${{ github.ref_name }}
              commit_sha: ${{ github.sha }}
              run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
              deploy_path: ${{ env.APP_DIR }}
              ci_status: ${{ needs.ci.result }}
              deploy_status: ${{ needs.deploy.result }}
