services:
  postgres:
    image: postgres:18
    container_name: dingstock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dingstock
      POSTGRES_PASSWORD: dingstock_password
      POSTGRES_DB: dingstock_finance
    ports:
      - '5432:5432'
    volumes:
      - ./.volumes/postgres:/var/lib/postgresql
    networks:
      - dingstock-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dingstock -d dingstock_finance']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: dingstock-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - ./.volumes/redis:/data
    networks:
      - dingstock-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dingstock-network:
    driver: bridge
